<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Successful</title>

  <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a8a, #312e81);
            font-family: Arial, sans-serif;
            color: white;
        }

        .card {
            background: white;
            color: #1f2937;
            padding: 40px 50px;
            border-radius: 15px;
            text-align: center;
            width: 450px;
            animation: slideUp 1s ease-out;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .check {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pop 0.6s ease-in-out;
        }

        .check::after {
            content: "✔";
            font-size: 40px;
            color: white;
        }

        h2 {
            margin-bottom: 15px;
            color: #111827;
        }

        p {
            margin-bottom: 25px;
            color: #374151;
            font-size: 16px;
            line-height: 1.6;
        }

        .highlight {
            color: #312e81;
            font-weight: 600;
        }

        a {
            text-decoration: none;
            padding: 12px 26px;
            background: #312e81;
            color: white;
            border-radius: 6px;
            transition: 0.3s;
            display: inline-block;
        }

        a:hover {
            background: #1e3a8a;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 📱 MOBILE VIEW IMPROVEMENTS */
        @media (max-width: 600px) {

            body {
                padding: 20px;
                height: auto;
                margin-top: 170px;
            }

            .card {
                width: 100%;
                max-width: 360px;
                padding: 30px 25px;
                border-radius: 12px;
            }

            .check {
                width: 65px;
                height: 65px;
                margin-bottom: 15px;
            }

            .check::after {
                font-size: 32px;
            }

            h2 {
                font-size: 22px;
            }

            p {
                font-size: 15px;
            }

            a {
                width: 100%;
                padding: 12px 0;
                font-size: 15px;
            }
        }

        /* 🌌 ANIMATED BACKGROUND */
        body {
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🪶 CARD FLOATING EFFECT */
        .card {
            animation: slideUp 1s ease-out, floatCard 5s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }

        /* ✨ GLOWING SUCCESS CIRCLE */
        .check {
            box-shadow: 0 0 20px rgba(34,197,94,0.6);
            animation: pop 0.6s ease-in-out, glowPulse 2.5s infinite;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 15px rgba(34,197,94,0.4); }
            50% { box-shadow: 0 0 30px rgba(34,197,94,0.9); }
            100% { box-shadow: 0 0 15px rgba(34,197,94,0.4); }
        }

        /* 📝 TEXT FADE IN SEQUENCE */
        h2 {
            animation: fadeIn 1.2s ease forwards;
        }

        p {
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
            animation-delay: 0.6s;
        }

        /* 🔘 BUTTON SOFT BREATHING GLOW */
        a {
            animation: buttonGlow 3s ease-in-out infinite;
        }

        @keyframes buttonGlow {
            0% { box-shadow: 0 0 8px rgba(49,46,129,0.4); }
            50% { box-shadow: 0 0 20px rgba(49,46,129,0.9); }
            100% { box-shadow: 0 0 8px rgba(49,46,129,0.4); }
        }

        /* GENERIC FADE */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>

<body>

<div class="card">
  <div class="check"></div>

  <h2>Registration Successful!</h2>

  <!-- 🔥 PERSONALIZED MESSAGE -->
  <p>
    Dear <span class="highlight" th:text="${registration.studentName}" style="font-weight: bold;">Student</span>,<br>
    you have been successfully registered for the <br>
    <span class="highlight" th:text="${registration.eventName}" style="font-weight: bold;">Event</span> event. <br>
    <br>
    Stay tuned for Further Info!
  </p>

  <a href="/">Register For Another Event</a>
</div>

</body>
</html>
