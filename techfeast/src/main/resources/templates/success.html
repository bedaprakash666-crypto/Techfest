<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success | E-Flair 2k26</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
        :root {
            --success-green: #22c55e;
            --cyan-400: #22d3ee;
            --slate-900: #020617;
            --glass: rgba(15, 23, 42, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--slate-900);
            color: white;
            overflow: hidden;
            background-image: radial-gradient(circle at 2px 2px, rgba(34, 211, 238, 0.05) 1px, transparent 0);
            background-size: 30px 30px;
        }

        /* Ambient Glow Background */
        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        /* Top Success Border */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--success-green);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 0 15px var(--success-green);
        }

        .check-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
            position: relative;
        }

        .check-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--success-green);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }

        .check-circle svg {
            width: 45px;
            height: 45px;
            color: var(--success-green);
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.8s ease forwards 0.4s;
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .msg-text {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .highlight {
            color: var(--cyan-400);
            font-weight: 700;
        }

        /* Event List Styling */
        .event-list {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            list-style: none;
            text-align: left;
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .event-item::before {
            content: "✦";
            color: var(--cyan-400);
            font-size: 0.8rem;
        }

        .btn-home {
            text-decoration: none;
            padding: 15px 30px;
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            color: white;
            border-radius: 15px;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(30, 64, 175, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.5);
        }

        /* --- ANIMATIONS --- */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        @media (max-width: 480px) {
            .card { padding: 40px 25px; }
            h2 { font-size: 1.6rem; }
        }

        /* --- NEW KEYFRAMES --- */
        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        @keyframes contentSlide {
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="card">
  <div class="check-container">
    <div class="check-circle">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    </div>
  </div>

  <h2>Registration Done!</h2>

  <p class="msg-text">
    Awesome, <span class="highlight" th:text="${registrations[0].studentName}">Student</span>!
    Your spot is reserved for the following Event:
  </p>

  <ul class="event-list">
    <li class="event-item" th:each="reg : ${registrations}" th:text="${reg.eventName}">
      Event Name
    </li>
  </ul>

  <p class="msg-text" style="font-size: 0.85rem; margin-bottom: 20px;">
    Stay tuned for Further details. See you at the Fest!
  </p>

  <a href="/" class="btn-home">Back to Home</a>
</div>

</body>
</html>
