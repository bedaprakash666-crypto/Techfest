<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>E-Flair TechFest 2k26</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top right,#1e1b4b,#020617),
radial-gradient(circle at bottom left,#312e81,#020617);
color:white;
display:flex;
align-items:center;
justify-content:center;
overflow-x:hidden;
}

/* PARTICLES */

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.particles span{
position:absolute;
width:4px;
height:4px;
background:#00f2fe;
border-radius:50%;
animation:floatParticles linear infinite;
}

@keyframes floatParticles{
from{transform:translateY(100vh) scale(.5);opacity:0;}
10%{opacity:1;}
to{transform:translateY(-10vh) scale(1);opacity:0;}
}

/* HERO */

.hero{
width:100%;
max-width:2000px;
text-align:center;
padding:20px;
animation:fadeUp 1s ease;
}

h1{
font-size:3.4rem;
background:linear-gradient(to right,#fff,#00f2fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

h3{
font-weight:300;
opacity:.85;
margin-bottom:25px;
}

/* REGISTER BUTTON */

.register-btn{
display:inline-block;
padding:14px 36px;
font-size:18px;
border-radius:30px;
text-decoration:none;
color:white;
background:linear-gradient(90deg,#8b5cf6,#ec4899);
box-shadow:0 0 25px rgba(236,72,153,.6);
transition:.4s;
margin-bottom:40px;
}

.register-btn:hover{
transform:translateY(-3px);
box-shadow:0 0 35px rgba(236,72,153,.9);
}

/* ADMIN BUTTON */

.admin-btn{
position:absolute;
top:20px;
right:20px;
padding:8px 18px;
border-radius:8px;
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.2);
color:white;
text-decoration:none;
font-size:14px;
transition:.3s;
}

.admin-btn:hover{
background:#00f2fe;
color:#020617;
box-shadow:0 0 20px rgba(0,242,254,.6);
}

/* EVENT CARDS */

.container{
display:flex;
justify-content:center;
gap:50px;
flex-wrap:wrap;
}

.box{
width:260px;
height:200px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.1);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:22px;
text-decoration:none;
color:white;
transition:.4s;
box-shadow:0 15px 35px rgba(0,0,0,.4);
}

.box:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 30px rgba(0,242,254,.5);
}

.icon{
font-size:48px;
margin-bottom:10px;
}

        /* ===================== */
        /* DESKTOP SUPPORT TEXT */
        /* ===================== */
        .support-text {
            position: fixed;
            bottom: 12px;
            right: 18px;
            font-size: 13px;
            color: rgba(255, 255, 255, 1);
            text-align: middle;
            transition: all 0.3s ease;
        }

        .support-text a {
            color: rgba(30, 136, 229, 0.6);
            text-decoration: none;
            font-weight: 500;
        }

        .support-text:hover a {
            color: #1e88e5;
            text-decoration: underline;
        }

<!--/* SUPPORT TEXT */-->

<!--margin-top:40px;-->
<!--font-size:13px;-->
<!--opacity:.8;-->
<!--}-->

<!--.support-text a{-->
<!--color:#38bdf8;-->
<!--text-decoration:none;-->
<!--}-->

<!--.support-text a:hover{-->
<!--text-decoration:underline;-->
<!--}-->

/* ANIMATIONS */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
        /* ===================== */
        /* MOBILE VIEW FIXES */
        /* ===================== */
        @media (max-width: 768px) {

            body {
                height: auto;
                padding: 20px 0;
            }

            h1 {
                font-size: 3.0rem;
                line-height: 1.5;
            }

            h3 {
                font-size: 1rem;
                margin-bottom: 25px;
            }

            .register-btn {
                font-size: 16px;
                padding: 12px 30px;
                margin-bottom: 30px;
            }

            .container {
                flex-direction: column;
                gap: 22px;
                align-items: center;
            }

            .box {
                width: 90%;
                height: 180px;
                font-size: 20px;
            }

            .icon {
                font-size: 42px;
            }

            /* Move support text to center BELOW content */
            .support-text {
                position: static;
                margin-top: 30px;
                text-align: center;
                font-size: 12.5px;
            }
        }

</head>

<div class="particles">
    <span style="left:10%;animation-duration:18s;"></span>
    <span style="left:20%;animation-duration:22s;"></span>
    <span style="left:30%;animation-duration:16s;"></span>
    <span style="left:40%;animation-duration:20s;"></span>
    <span style="left:50%;animation-duration:18s;"></span>
    <span style="left:60%;animation-duration:25s;"></span>
    <span style="left:70%;animation-duration:19s;"></span>
    <span style="left:80%;animation-duration:23s;"></span>
    <span style="left:90%;animation-duration:21s;"></span>
</div>

<div class="hero">

    <h1>Welcome to E-Flair TechFest 2K26</h1>

    <h3>Organized by the Department of ECE & EEE</h3>
    <h3>Centurion University of Technology and Management, Paralakhemundi Campus</h3>

    <a href="/api/registrations/form" class="register-btn">Register Now</a>

    <div class="container">

        <a href="/technical" class="box">
            <div class="icon">⚡</div>
            Technical Events
        </a>

        <a href="/nontechnical" class="box">
            <div class="icon">🎨</div>
            Non-Technical Events
        </a>

    </div>

    <div class="support-text">
        <p><strong>Imagined & built by Beda</strong></p>
        <p>Need help? Contact ↴</p>
        <p><a href="mailto:230101150001@centurionuniv.edu.in">230101150001@centurionuniv.edu.in</a></p>
    </div>

</div>

</body>
</html>
